name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    env:
      POSTGRES_URL: postgresql://user:pass@localhost:5432/ci
      BASE_URL: http://localhost:3000
      AUTH_SECRET: ci-secret-not-used
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm exec tsc --noEmit

      - run: pnpm test
